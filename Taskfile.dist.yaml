version: '3'

vars:
  MODEL: models/flowerpot-hole-support.scad
  STL: build/flowerpot-hole-support.stl
  OPENSCAD_APP: OpenSCAD

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  check:
    desc: Verify OpenSCAD and Task are available
    cmds:
      - openscad --version
      - task --version

  open:
    desc: Open a model in a fresh OpenSCAD window on macOS
    summary: |
      Usage:
        task open -- models/flowerpot-hole-support.scad
    vars:
      TARGET: '{{default .MODEL .CLI_ARGS}}'
    cmds:
      - open -n -a '{{.OPENSCAD_APP}}' '{{.TARGET}}'

  render:
    desc: Render the flowerpot support STL
    deps: [check]
    cmds:
      - mkdir -p build
      - openscad -o {{.STL}} {{.MODEL}}
    sources:
      - '{{.MODEL}}'
    generates:
      - '{{.STL}}'

  clean:
    desc: Remove generated models
    cmds:
      - rm -rf build
