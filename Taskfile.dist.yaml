version: "3"

vars:
  MODEL: projects/flowerpot-hole-support/adapter.scad
  STL: build/flowerpot-hole-support-adapter.stl

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  check:
    desc: Verify OpenSCAD and Task are available
    cmds:
      - openscad --version
      - task --version

  open:
    desc: Open a model in OpenSCAD GUI
    summary: |
      Usage:
        task open -- projects/flowerpot-hole-support/adapter.scad
    vars:
      TARGET: "{{default .MODEL .CLI_ARGS}}"
    cmds:
      - openscad "{{.TARGET}}"

  render:
    desc: Render the flowerpot support STL
    deps: [check]
    cmds:
      - mkdir -p build
      - openscad -o {{.STL}} {{.MODEL}}
    sources:
      - "{{.MODEL}}"
    generates:
      - "{{.STL}}"

  clean:
    desc: Remove generated models
    cmds:
      - rm -rf build
